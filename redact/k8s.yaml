apiVersion: v1
kind: Namespace
metadata:
  name: redact
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redact
  namespace: redact
  labels:
    app: redact
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redact
  template:
    metadata:
      labels:
        app: redact
    spec:
      containers:
        - name: redact
          image: ghcr.io/geekvoice408/vibes/redact:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redact
  namespace: redact
  labels:
    app: redact
spec:
  selector:
    app: redact
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redact
  namespace: redact
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: redact.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redact
                port:
                  number: 80
  tls:
    - hosts:
        - redact.example.com
      secretName: redact-tls
