name: redact tests

on:
  push:
    branches: [main]
    paths:
      - 'redact/**'
  pull_request:
    paths:
      - 'redact/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node --test
        working-directory: redact
